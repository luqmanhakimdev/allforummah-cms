name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm ci fails with EBADPLATFORM on optional @esbuild/* packages
      - run: npm install --no-audit --no-fund
      - run: npm run type-check
